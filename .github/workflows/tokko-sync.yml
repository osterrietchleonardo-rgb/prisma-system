name: PRISMA Tokko Sync

on:
  schedule:
    # GitHub usa UTC; Argentina es UTC-3 (sin horario de verano).
    # 10:00 UTC = 07:00 AM Argentina
    - cron: '0 10 * * *'
    # 21:00 UTC = 18:00 (6 PM) Argentina
    - cron: '0 21 * * *'
  workflow_dispatch:
    # Permite dispararlo manualmente desde la pestaña Actions de GitHub.

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Tokko sync endpoint (propiedades + leads, todas las agencias)
        run: |
          curl -sS --max-time 290 -X GET "https://${{ secrets.SITE_DOMAIN }}/api/cron/tokko-sync" \
               -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"

      # Colgado del mismo cron (2×/día): sincroniza costos de IA (OpenAI + Anthropic + Gemini)
      # hacia finanzas. Independiente del paso anterior (if: always) y no rompe el workflow si falla.
      - name: Trigger Finance costs sync (OpenAI + Anthropic + Gemini)
        if: always()
        continue-on-error: true
        run: |
          curl -sS --max-time 120 -X GET "https://${{ secrets.SITE_DOMAIN }}/api/cron/finance-sync?days=7" \
               -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"

      # Colgado del mismo cron (2×/día): Experto 1 (WhatsApp) del módulo de Métricas.
      - name: Trigger Audit WhatsApp (Experto 1)
        if: always()
        continue-on-error: true
        run: |
          curl -sS --max-time 120 -X GET "https://${{ secrets.SITE_DOMAIN }}/api/cron/audit-whatsapp" \
               -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"
